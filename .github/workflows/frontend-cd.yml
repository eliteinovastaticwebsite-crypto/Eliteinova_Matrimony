name: Frontend CD - Deploy to Cloud Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'eliteinova' }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: matrimony-frontend
  ARTIFACT_REGISTRY_REPO: matrimony-repo

jobs:
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify project and set default
        run: |
          gcloud config set project $PROJECT_ID
          echo "Current project: $(gcloud config get-value project)"
          echo "Project number: $(gcloud projects describe $PROJECT_ID --format='value(projectNumber)')"
          # Verify project exists and is accessible
          gcloud projects describe $PROJECT_ID || {
            echo "❌ Error: Project $PROJECT_ID not found or not accessible"
            exit 1
          }

      - name: Create Artifact Registry repository if not exists
        run: |
          # Check if repository exists, create if not
          if ! gcloud artifacts repositories describe $ARTIFACT_REGISTRY_REPO \
            --location=$REGION \
            --project=$PROJECT_ID 2>/dev/null; then
            echo "Creating Artifact Registry repository..."
            gcloud artifacts repositories create $ARTIFACT_REGISTRY_REPO \
              --repository-format=docker \
              --location=$REGION \
              --description="Docker repository for matrimony app" \
              --project=$PROJECT_ID || echo "Repository may already exist or creation failed"
          else
            echo "Artifact Registry repository already exists"
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Get Backend URL
        id: backend-url
        run: |
          # Try to get backend URL from secret, or fetch from Cloud Run
          if [ -n "${{ secrets.BACKEND_URL }}" ]; then
            BACKEND_URL="${{ secrets.BACKEND_URL }}"
          elif [ -n "${{ secrets.VITE_API_URL }}" ]; then
            BACKEND_URL="${{ secrets.VITE_API_URL }}"
          else
            # Try to get from Cloud Run service
            BACKEND_URL=$(gcloud run services describe matrimony-backend \
              --region $REGION \
              --format 'value(status.url)' 2>/dev/null || echo "")
          fi
          
          if [ -z "$BACKEND_URL" ]; then
            echo "⚠️ Backend URL not found. Using default."
            BACKEND_URL="https://matrimony-backend-xxxxx-uc.a.run.app"
          fi
          
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Using Backend URL: $BACKEND_URL"

      - name: Build Frontend Docker image
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME"
          docker build \
            --build-arg VITE_API_URL=${{ steps.backend-url.outputs.url }} \
            -t $IMAGE_URI:$GITHUB_SHA \
            -f Dockerfile .
          docker tag $IMAGE_URI:$GITHUB_SHA $IMAGE_URI:latest
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Push Frontend image to Artifact Registry
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME"
          echo "Pushing image: $IMAGE_URI:$GITHUB_SHA"
          docker push $IMAGE_URI:$GITHUB_SHA
          echo "Pushing latest tag: $IMAGE_URI:latest"
          docker push $IMAGE_URI:latest

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME:$GITHUB_SHA"
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_URI \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10

      - name: Get Frontend URL
        id: frontend-url
        run: |
          FRONTEND_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: $FRONTEND_URL"
          echo "::notice::Frontend URL: $FRONTEND_URL"
          echo "::notice::Backend URL: ${{ steps.backend-url.outputs.url }}"

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Frontend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY

