name: Frontend CD - Deploy to Cloud Run

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'eliteinova' }}
  REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: matrimony-frontend
  ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO || 'cloud-run-source-deploy' }}

jobs:
  deploy:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify project and service account
        run: |
          gcloud config set project $PROJECT_ID
          echo "Current project: $(gcloud config get-value project)"
          
          # Get project details
          PROJECT_NUMBER=$(gcloud projects describe $PROJECT_ID --format='value(projectNumber)' 2>/dev/null)
          PROJECT_STATE=$(gcloud projects describe $PROJECT_ID --format='value(lifecycleState)' 2>/dev/null)
          
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "❌ ERROR: Project $PROJECT_ID not found!"
            echo "Please verify the project ID is correct."
            exit 1
          fi
          
          if [ "$PROJECT_STATE" != "ACTIVE" ]; then
            echo "❌ ERROR: Project $PROJECT_ID is not ACTIVE (State: $PROJECT_STATE)"
            exit 1
          fi
          
          echo "✅ Project verified: $PROJECT_ID (Number: $PROJECT_NUMBER, State: $PROJECT_STATE)"
          
          # Verify service account is in the correct project
          SA_EMAIL=$(gcloud auth list --filter=status:ACTIVE --format="value(account)" 2>/dev/null | head -n1)
          if [ -n "$SA_EMAIL" ]; then
            echo "Service account in use: $SA_EMAIL"
            # Check if it's from the correct project
            if [[ "$SA_EMAIL" != *"@${PROJECT_ID}.iam.gserviceaccount.com" ]] && [[ "$SA_EMAIL" != *"@${PROJECT_ID}.appspot.com" ]]; then
              echo "⚠️  WARNING: Service account may be from a different project!"
              echo "Expected: *@${PROJECT_ID}.iam.gserviceaccount.com"
              echo "Found: $SA_EMAIL"
            fi
          fi

      - name: Verify Artifact Registry repository
        run: |
          echo "Checking Artifact Registry repository: $ARTIFACT_REGISTRY_REPO"
          
          # Verify repository exists and is accessible
          if gcloud artifacts repositories describe $ARTIFACT_REGISTRY_REPO \
            --location=$REGION \
            --project=$PROJECT_ID 2>/dev/null; then
            echo "✅ Repository exists and is accessible: $ARTIFACT_REGISTRY_REPO"
          else
            echo "❌ Repository '$ARTIFACT_REGISTRY_REPO' not found or not accessible!"
            echo ""
            echo "Listing available repositories:"
            gcloud artifacts repositories list --location=$REGION --project=$PROJECT_ID --format="table(name,format,location)" || echo "Cannot list repositories"
            echo ""
            echo "Please either:"
            echo "1. Create the repository manually in Cloud Shell:"
            echo "   gcloud artifacts repositories create $ARTIFACT_REGISTRY_REPO \\"
            echo "     --repository-format=docker \\"
            echo "     --location=$REGION \\"
            echo "     --project=$PROJECT_ID"
            echo ""
            echo "2. Or set ARTIFACT_REGISTRY_REPO secret in GitHub to use existing repository"
            echo "   (e.g., 'cloud-run-source-deploy')"
            exit 1
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Backend URL
        id: backend-url
        run: |
          # Try to get backend URL from secret, or fetch from Cloud Run
          if [ -n "${{ secrets.BACKEND_URL }}" ]; then
            BACKEND_URL="${{ secrets.BACKEND_URL }}"
          elif [ -n "${{ secrets.VITE_API_URL }}" ]; then
            BACKEND_URL="${{ secrets.VITE_API_URL }}"
          else
            # Try to get from Cloud Run service
            BACKEND_URL=$(gcloud run services describe matrimony-backend \
              --region $REGION \
              --format 'value(status.url)' 2>/dev/null || echo "")
          fi
          
          if [ -z "$BACKEND_URL" ]; then
            echo "⚠️ Backend URL not found. Using default."
            BACKEND_URL="https://matrimony-backend-xxxxx-uc.a.run.app"
          fi
          
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Using Backend URL: $BACKEND_URL"

      - name: Build Frontend Docker image
        run: |
          echo "🔨 Building Docker image..."
          echo "Backend URL: ${{ steps.backend-url.outputs.url }}"
          echo "Git SHA: $GITHUB_SHA"
          
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME"
          echo "Image URI: $IMAGE_URI"
          
          # Verify Dockerfile exists
          if [ ! -f Dockerfile ]; then
            echo "❌ ERROR: Dockerfile not found!"
            ls -la
            exit 1
          fi
          
          echo "Building image..."
          docker build \
            --build-arg VITE_API_URL=${{ steps.backend-url.outputs.url }} \
            -t $IMAGE_URI:$GITHUB_SHA \
            -f Dockerfile . || {
            echo "❌ Docker build failed!"
            exit 1
          }
          
          echo "Tagging as latest..."
          docker tag $IMAGE_URI:$GITHUB_SHA $IMAGE_URI:latest
          
          echo "✅ Build complete!"
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV
          
          # List built images
          echo "Built images:"
          docker images | grep "$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME" || echo "No images found"

      - name: Push Frontend image to Artifact Registry
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME"
          echo "Pushing image: $IMAGE_URI:$GITHUB_SHA"
          docker push $IMAGE_URI:$GITHUB_SHA || {
            echo "❌ Failed to push image with SHA tag"
            exit 1
          }
          echo "✅ Image pushed successfully: $IMAGE_URI:$GITHUB_SHA"
          
          echo "Pushing latest tag: $IMAGE_URI:latest"
          docker push $IMAGE_URI:latest || {
            echo "⚠️ Failed to push latest tag, but continuing with SHA tag..."
          }
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Verify image exists in Artifact Registry
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME"
          echo "Verifying image exists: $IMAGE_URI:$GITHUB_SHA"
          gcloud artifacts docker images describe $IMAGE_URI:$GITHUB_SHA \
            --project=$PROJECT_ID || {
            echo "❌ Image not found in Artifact Registry!"
            exit 1
          }
          echo "✅ Image verified in Artifact Registry"

      - name: Deploy Frontend to Cloud Run
        run: |
          IMAGE_URI="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME:$GITHUB_SHA"
          echo "Deploying to Cloud Run..."
          echo "Image: $IMAGE_URI"
          echo "Service: $SERVICE_NAME"
          echo "Region: $REGION"
          echo "Project: $PROJECT_ID"
          
          # Check if service already exists
          if gcloud run services describe $SERVICE_NAME --region $REGION --project=$PROJECT_ID 2>/dev/null; then
            echo "Service already exists, updating..."
          else
            echo "Creating new service..."
          fi
          
          # Deploy with explicit project
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE_URI \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --project=$PROJECT_ID \
            --quiet || {
            echo "❌ Deployment failed!"
            echo ""
            echo "Troubleshooting:"
            echo "1. Check if image exists:"
            gcloud artifacts docker images list $REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REGISTRY_REPO/$SERVICE_NAME --limit=5 || echo "  Cannot list images"
            echo ""
            echo "2. Check service account permissions:"
            gcloud projects get-iam-policy $PROJECT_ID --flatten="bindings[].members" --filter="bindings.members:*run-service-account*" --format="table(bindings.role)" || echo "  Cannot check permissions"
            echo ""
            echo "3. Try listing existing services:"
            gcloud run services list --region $REGION --project=$PROJECT_ID || echo "  Cannot list services"
            exit 1
          }
          
          echo "✅ Deployment successful!"
          
          # Verify deployment
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --region $REGION --project=$PROJECT_ID --format='value(status.url)' 2>/dev/null)
          if [ -n "$SERVICE_URL" ]; then
            echo "Service URL: $SERVICE_URL"
          fi

      - name: Get Frontend URL
        id: frontend-url
        run: |
          FRONTEND_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION \
            --format 'value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: $FRONTEND_URL"
          echo "::notice::Frontend URL: $FRONTEND_URL"
          echo "::notice::Backend URL: ${{ steps.backend-url.outputs.url }}"

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Frontend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY

