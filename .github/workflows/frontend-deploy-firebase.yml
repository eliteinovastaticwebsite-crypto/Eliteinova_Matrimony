name: Frontend Deploy - Firebase Hosting

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'eliteinova' }}
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID || 'eliteinova' }}

jobs:
  deploy:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get Backend URL
        id: backend-url
        run: |
          # Try to get backend URL from secret, or fetch from Cloud Run
          if [ -n "${{ secrets.BACKEND_URL }}" ]; then
            BACKEND_URL="${{ secrets.BACKEND_URL }}"
          elif [ -n "${{ secrets.VITE_API_URL }}" ]; then
            BACKEND_URL="${{ secrets.VITE_API_URL }}"
          else
            # Try to get from Cloud Run service
            BACKEND_URL=$(gcloud run services describe matrimony-backend \
              --region us-central1 \
              --format 'value(status.url)' 2>/dev/null || echo "")
          fi
          
          if [ -z "$BACKEND_URL" ]; then
            echo "⚠️ Backend URL not found. Using default."
            BACKEND_URL="https://matrimony-backend-xxxxx-uc.a.run.app"
          fi
          
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Using Backend URL: $BACKEND_URL"

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ steps.backend-url.outputs.url }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          channelId: live
          target: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Get Deployment URL
        id: deployment-url
        run: |
          # Firebase Hosting URL format: https://PROJECT_ID.web.app or https://PROJECT_ID.firebaseapp.com
          DEPLOYMENT_URL="https://${{ env.FIREBASE_PROJECT_ID }}.web.app"
          echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: $DEPLOYMENT_URL"
          echo "::notice::Frontend URL: $DEPLOYMENT_URL"
          echo "::notice::Backend URL: ${{ steps.backend-url.outputs.url }}"

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Frontend Deployment Complete - Firebase Hosting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ steps.deployment-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Application URLs:" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Frontend: [${{ steps.deployment-url.outputs.url }}](${{ steps.deployment-url.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "- 🔧 Backend: [${{ steps.backend-url.outputs.url }}](${{ steps.backend-url.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Global CDN distribution" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Automatic SSL certificates" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Fast static asset delivery" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SPA routing support" >> $GITHUB_STEP_SUMMARY

