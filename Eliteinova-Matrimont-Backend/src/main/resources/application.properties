# Server
server.port=8080
spring.application.name=eliteinova-matrimony-backend

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.server.port=8080


# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/matrimony_db
spring.datasource.username=postgres
spring.datasource.password=root

# JPA - CHANGED THESE LINES
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SQL Files - ADD THESE LINES
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# File Upload Configuration
file.upload-dir=./uploads
spring.servlet.multipart.location=./uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Disable Tomcat temp directory for file uploads
server.servlet.registration.multipart.enabled=true

# JWT Secret
jwt.secret=matrimonySuperSecretKeyForJWTSigning2024!ChangeThisInProduction
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000